<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteio de números</title>
    <style>
        /* --- Estilos Gerais e Fontes --- */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=Roboto+Slab:wght@700&display=swap');

        /* --- Variáveis de Cor --- */
        :root {
            /* Tema Claro (Padrão) */
            --bg-page: #f8f7fa;
            --bg-container: #fcfaff;
            --bg-input: #fff;
            --bg-circle: #e9e9ed;
            --circle-large-bg-color: #f71501; /* Cor específica para o fundo do círculo maior */
            --circle-large-font-color: #ffffff; /* Cor específica para a fonte do círculo maior */
            --text-primary: #333;
            --text-secondary: #3d3d4e;
            --text-label: #6c567b;
            --text-placeholder: #b0b0b0; /* Cor unificada para placeholders */
            --border-color: #e0dbe1; /* Cor para bordas internas */
            --main-container-border-color: #f71501; /* Cor específica para a borda principal */
            --shadow-color: rgba(0,0,0,0.05);

            /* Cores do Brilho */
            --primary-glow-color: #FFD700;
            --secondary-glow-color: #FFFDE7;
        }

        :root.dark-theme {
            /* Tema Escuro */
            --bg-page: #121212;
            --bg-container: #1e1e1e;
            --bg-input: #2c2c2c;
            --bg-circle: #333333;
            --circle-large-bg-color: #1b0684; /* Cor específica para o fundo do círculo maior */
            --circle-large-font-color: #ffffff; /* Cor específica para a fonte do círculo maior */
            --text-primary: #e0e0e0;
            --text-secondary: #f0f0f0;
            --text-label: #adadc2;
            --border-color: #444444; /* Cor para bordas internas */
            --main-container-border-color: #002aff; /* Cor específica para a borda principal */
            --shadow-color: rgba(255,255,255,0.05);
        }

        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        /* --- Container Principal --- */
        .main-container {
            max-width: 1600px;
            margin: 1rem auto; /* Alterado */
            border: 10px solid var(--main-container-border-color); /* Borda alterada */
            background-color: var(--bg-container);
            border-radius: 12px;
            box-shadow: 0 8px 32px var(--shadow-color);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 4rem);
            transition: background-color 0.3s, border-color 0.3s;
        }

        /* --- Seção Superior --- */
        .top-section {
            background-color: transparent;
            display: flex;
            align-items: center;
            padding: 0rem 1rem;
            box-sizing: border-box;
            overflow: hidden; /* Required for CSS marquee effect */
        }

        /* --- Botão de Tema --- */
        .theme-toggle-btn, .config-btn {
            background-color: var(--bg-circle);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background-color 0.3s, transform 0.2s;
        }
        .theme-toggle-btn:hover, .config-btn:hover {
            transform: scale(1.1);
        }
        
        /* --- Seletor de Cor --- */
        .color-picker {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            width: 30px;
            height: 30px;
            background-color: transparent;
            border: none;
            cursor: pointer;
            padding: 0;
        }
        .color-picker::-webkit-color-swatch {
            border-radius: 50%;
            border: 2px solid var(--text-placeholder);
        }
        .color-picker::-moz-color-swatch {
            border-radius: 50%;
            border: 2px solid var(--text-placeholder);
        }


        /* --- Seção dos Círculos --- */
        .circles-container {
            display: flex;
            justify-content: space-evenly;
            align-items: self-end;
            gap: 4rem; 
            padding: 5rem 2rem;
            flex-grow: 1;
            flex-wrap: wrap;
            background-color: transparent;
        }
        
        .circle-wrapper {
            position: relative;
        }

        .circle {
            background-color: var(--bg-circle);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            font-weight: 700;
            text-align: center;
            overflow-wrap: break-word;
            word-break: break-all;
            padding: 1rem;
            box-sizing: border-box;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }
        
        #circle-large {
            width: 320px;
            height: 320px;
            font-size: 8.8rem;
            box-shadow: 0 0 15px var(--secondary-glow-color), 0 0 30px var(--secondary-glow-color), 0 0 45px var(--primary-glow-color), 0 0 60px var(--primary-glow-color);
            animation: pulse-glow-gold 0.5s infinite alternate;
            background-color: var(--circle-large-bg-color);
            color: var(--circle-large-font-color);
        }
        
        #circle-medium, #circle-small {
            color: var(--text-placeholder);
        }

        #circle-medium { width: 285px; height: 285px; font-size: 7.8rem; }
        #circle-small { width: 220px; height: 220px; font-size: 6rem; }
        
        .floating-badge {
            position: absolute;
            bottom: -2rem; 
            right: 0;
            transform: translateX(15%);
            background-color: transparent;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            font-family: 'Roboto Slab', serif;
            font-weight: 700;
            z-index: 10;
            padding: 0;
            box-sizing: border-box;
            transition: color 0.3s ease;
            line-height: 0.8; 
        }
        
        #badge-large {
            width: 100px;
            height: 100px;
            color: var(--circle-large-bg-color);
            -webkit-text-stroke: 2px var(--circle-large-font-color);
            text-stroke: 2px var(--circle-large-font-color);
            font-size: 8rem;
            text-shadow: 0 0 8px var(--secondary-glow-color), 0 0 12px var(--secondary-glow-color), 0 0 16px var(--primary-glow-color), 0 0 20px var(--primary-glow-color);
        }

        #badge-medium {
            width: 70px;
            height: 70px;
            color: var(--bg-circle);
            -webkit-text-stroke: 2px var(--text-placeholder);
            text-stroke: 2px var(--text-placeholder);
            font-size: 4.1rem;
        }

        #badge-small {
            width: 60px;
            height: 60px;
            color: var(--bg-circle);
            -webkit-text-stroke: 2px var(--text-placeholder);
            text-stroke: 2px var(--text-placeholder);
            font-size: 3.5rem;
        }
        
        /* --- Seção de Entrada de Texto --- */
        
        #multi-line-input::placeholder {
             color: var(--text-placeholder);
        }

        #single-line-marquee {
            font-size: 4rem;      /* ou ajuste conforme necessário */
            font-weight: 400;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,"Segoe UI", 'Inter',  Helvetica, Arial, sans-serif;
            white-space: nowrap;
            line-height: 1.2;
            padding: 0 0;
            background: transparent;
            border: none;
            display: inline-block;
        }
        #single-line-marquee.is-animating {
            animation: marquee-left-pause-left 25s linear;
        }

        /* --- Seção Inferior --- */
        .bottom-section {}

        .input-wrapper {
            padding: 0rem 1rem;
            display: flex;
            align-items: flex-end;
            gap: 0.5rem;
            padding-bottom: 1rem;
        }
        
        .textarea-container {
            flex-grow: 1;
        }
        
        #multi-line-input {
            width: 100%;
            height: 9.6rem;
            padding: 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            resize: vertical;
            box-sizing: border-box;
            font-size: 2.4rem;
            line-height: 1.2;
            background-color: var(--bg-input);
            color: var(--text-primary);
        }
        
        #multi-line-input:focus {
            outline: none;
            border-color: var(--main-container-border-color);
        }

        .flash-success { animation: flash-success-animation 1s ease-in-out 1; }
        .flash-error { animation: flash-error-animation 1s ease-in-out 1; }
        
        .bottom-controls {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            align-items: center;
        }
        
        .numbers-btn {
            background-color: var(--bg-circle);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            margin-bottom: 5px;
        }
        
        /* --- Modal --- */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 1rem;
            box-sizing: border-box;
        }
        .modal-content {
            background-color: var(--bg-container);
            color: var(--text-primary);
            padding: 2rem;
            border-radius: 12px;
            max-width: 750px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .modal-close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            background: none;
            border: none;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-placeholder);
        }
        
        .modal-table-wrapper {
            overflow-y: auto;
            min-height: 0;
        }
        
        #sorted-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        
        #sorted-table th, #sorted-table td {
            border: 1px solid var(--border-color);
            padding: 0.5rem;
            font-size: 2rem;
        }
        #sorted-table th {
            background-color: var(--circle-large-bg-color);
            color: var(--circle-large-font-color);
            font-family: 'Roboto Slab', serif;
            position: sticky;
            top: 0;
        }
        #sorted-table td {
            background-color: #fcfaff; 
            color: #333; 
        }
        
        /* Modal de Configuração */
        #config-modal .modal-content h2 { margin-top: 0; }
        #config-modal p { margin-bottom: 2rem; }
        .config-row { display: flex; align-items: stretch; margin-bottom: 1rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; }
        .config-range-group { display: flex; align-items: center; }
        .config-row .bingo-letter { font-size: 1.5rem; font-weight: bold; width: 30px; }
        .config-row span { margin: 0 0.5rem; }
        .config-row input {
            padding: 0.5rem;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background-color: var(--bg-input);
            color: var(--text-primary);
        }
        .config-row input[type="number"] {
             width: 40px;
             margin-left: 1rem;
             margin-right: 1rem;
        }
        .msg-input-group {
            flex-grow: 1;
            border-left: 1px solid var(--border-color);
            padding-left: 1rem;
            margin-left: 1rem;
        }
        .msg-input {
            width: 100%;
        }
        .config-api-label { font-weight: bold; margin-top: 1rem; }
        .modal-actions { margin-top: 2rem; display: flex; justify-content: flex-end; gap: 1rem; }

        .modal-input {
            width: 100%;
            padding: 0.75rem;
            margin-top: 0rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-input);
            color: var(--text-primary);
            font-size: 1rem;
            box-sizing: border-box;
            flex-shrink: 0; 
        }
        
        /* --- DESIGN RESPONSIVO --- */

        /* TELAS GRANDES (3 círculos) */
        @media (min-width: 1401px) {
            .circles-container { padding: 1rem; margin: 1rem; justify-content: space-between; } 
            #circle-large { width: 660px; height: 660px; font-size: 26rem; } 
            #circle-medium { width: 340px; height: 340px; font-size: 12rem; display: flex; } 
            #circle-small { width: 260px; height: 260px; font-size: 9rem; display: flex; } 
            #badge-large { width: 130px; height: 130px; font-size: 15.86rem; }
            #badge-medium { width: 110px; height: 110px; font-size: 7.5rem; }
            #badge-small { width: 90px; height: 90px; font-size: 6rem; }
        }
        
        /* TELAS MÉDIAS (2 círculos) */
        @media (min-width: 769px) and (max-width: 1400px) {
            .main-container { width: 95%; }
            .circles-container { justify-content: space-evenly; }
            #circle-large { width: 500px; height: 500px; font-size: 20rem; }
            #circle-medium { width: 250px; height: 250px; font-size: 8rem; display: flex; }
            .circle-wrapper:has(#circle-small) { display: none; }
            #badge-large { width: 100px; height: 100px; font-size: 12.675rem; }
            #badge-medium { width: 80px; height: 80px; font-size: 5rem; }
        }

        /* TELAS PEQUENAS (1 círculo) */
        @media (max-width: 768px) {
            .main-container { width: 95%; }
            .circles-container { flex-direction: column; gap: 2.5rem; justify-content: center;}
            #circle-large { width: 90vw; max-width: 400px; height: 90vw; max-height: 400px; font-size: 15vw; }
            .circle-wrapper:has(#circle-medium), .circle-wrapper:has(#circle-small) { display: none; }
            .input-wrapper { flex-direction: column; align-items: stretch; gap: 1.5rem; }
            #badge-large { width: 20vw; max-width: 80px; height: 20vw; max-height: 80px; font-size: 25.35vw; max-font-size: 8.5rem; }
        }
        
        /* --- Animações --- */
        @keyframes pulse-glow-gold {
            from {
                box-shadow: 0 0 10px #fff9c4, 0 0 20px #fff9c4, 0 0 30px #ffecb3, 0 0 40px #ffecb3;
            }
            to {
                box-shadow: 0 0 20px var(--secondary-glow-color), 0 0 35px var(--secondary-glow-color), 0 0 50px var(--primary-glow-color), 0 0 65px var(--primary-glow-color);
            }
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
        
        @keyframes flash-success-animation {
            50% { border-color: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        }
        
        @keyframes flash-error-animation {
            50% { border-color: #e74c3c; box-shadow: 0 0 10px #e74c3c; }
        }

    @keyframes marquee-left-pause-left {
        0% {
            transform: translateX(calc(100vw)); /* Garante que o texto comece totalmente fora da tela à direita */
            opacity: 1;
        }
        30% {
            transform: translateX(0%);
            opacity: 1;
        }
        90% {
            transform: translateX(0%);
            opacity: 1;
        }
        100% {
            /* Aplica apenas o fadeOut no final */
            opacity: 0;
        }
    }

    /* --- Animação de Fogos de Artifício --- */
    #fireworks-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 999; /* Sobre o conteúdo, mas abaixo dos modais */
        pointer-events: none; /* Impede interação com o mouse */
        display: none; /* Começa escondido */
    }
</style>
</head>
<body>
    <canvas id="fireworks-canvas"></canvas>

    <div class="main-container">
        <!-- Seção Superior -->
        <header class="top-section">
            <div id="single-line-marquee"></div>
        </header>

        <!-- Seção dos Círculos -->
        <main class="circles-container">
            <div class="circle-wrapper">
                <div class="circle" id="circle-large"></div>
                <div class="floating-badge" id="badge-large"> </div>
            </div>
            <div class="circle-wrapper">
                <div class="circle" id="circle-medium"></div>
                <div class="floating-badge" id="badge-medium"> </div>
            </div>
            <div class="circle-wrapper">
                <div class="circle" id="circle-small"></div>
                <div class="floating-badge" id="badge-small"> </div>
            </div>
        </main>
        
        <!-- Seção Inferior -->
        <footer class="bottom-section">
             <div class="input-wrapper">
                <div class="textarea-container">
                    <button class="numbers-btn" id="show-sorted-btn">Números</button>
                    <textarea id="multi-line-input" placeholder="Digite os números sorteados"></textarea>
                </div>
                <div class="bottom-controls">
                    <input type="color" id="border-color-picker" class="color-picker" title="Mudar cor da borda">
                    <input type="color" id="circle-large-color-picker" class="color-picker" title="Mudar cor do fundo do círculo">
                    <input type="color" id="circle-large-font-color-picker" class="color-picker" title="Mudar cor da fonte do círculo">
                    <button id="config-btn" class="config-btn" title="Configurações">⚙️</button>
                    <button id="theme-toggle" class="theme-toggle-btn">🌙</button>
                </div>
            </div>
        </footer>
    </div>
    
    <!-- Modal de Cartela -->
    <div id="sorted-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="modal-close-btn" class="modal-close-btn">&times;</button>
            <div class="modal-table-wrapper">
                <table id="sorted-table">
                    <thead>
                        <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
    
    <!-- Modal de Configuração -->
    <div id="config-modal" class="modal-overlay">
        <div class="modal-content">
            <button id="config-modal-close-btn" class="modal-close-btn">&times;</button>
            <h2>Configuração</h2>
            <p>Aqui estão as faixas de números das cartelas, as mensagens que serão mostradas no topo da tela (caso existam) e o endereço Internet já configurado para acompanhar o sorteio (opcional).</p>
            <div class="config-row">
                <div class="config-range-group">
                    <span class="bingo-letter">B</span> de <input type="number" id="b_min"> a <input type="number" id="b_max">
                </div>
                <div class="msg-input-group">
                    <input type="text" id="msg_1" class="modal-input msg-input" placeholder="Mensagem 1">
                </div>
                <div class="config-range-group">
                    <input type="number" id="tempo_1" min="10" max="50" value="20" title="Tempo em segundos para a mensagem 1">
                </div>
            </div>
            <div class="config-row">
                 <div class="config-range-group">
                    <span class="bingo-letter">I</span> de <input type="number" id="i_min"> a <input type="number" id="i_max">
                </div>
                <div class="msg-input-group">
                    <input type="text" id="msg_2" class="modal-input msg-input" placeholder="Mensagem 2">
                </div>
                <div class="config-range-group">
                    <input type="number" id="tempo_2" min="10" max="50" value="20" title="Tempo em segundos para a mensagem 2">
                </div>
            </div>
            <div class="config-row">
                <div class="config-range-group">
                    <span class="bingo-letter">N</span> de <input type="number" id="n_min"> a <input type="number" id="n_max">
                </div>
                <div class="msg-input-group">
                    <input type="text" id="msg_3" class="modal-input msg-input" placeholder="Mensagem 3">
                </div>
                <div class="config-range-group">
                    <input type="number" id="tempo_3" min="10" max="50" value="20" title="Tempo em segundos para a mensagem 3">
                </div>
            </div>
            <div class="config-row">
                <div class="config-range-group">
                    <span class="bingo-letter">G</span> de <input type="number" id="g_min"> a <input type="number" id="g_max">
                </div>
                <div class="msg-input-group">
                    <input type="text" id="msg_4" class="modal-input msg-input" placeholder="Mensagem 4">
                </div>
                <div class="config-range-group">
                    <input type="number" id="tempo_4" min="10" max="50" value="20" title="Tempo em segundos para a mensagem 4">
                </div>
            </div>
            <div class="config-row">
                <div class="config-range-group">
                    <span class="bingo-letter">O</span> de <input type="number" id="o_min"> a <input type="number" id="o_max">
                </div>
                <div class="msg-input-group">
                    <input type="text" id="msg_5" class="modal-input msg-input" placeholder="Mensagem 5">
                </div>
                <div class="config-range-group">
                    <input type="number" id="tempo_5" min="10" max="50" value="20" title="Tempo em segundos para a mensagem 5">
                </div>
            </div>
            <label class="config-api-label" for="apiUrl">API</label>
            <input type="text" id="apiUrl" class="modal-input" placeholder="http://0.0.0.0:8000">
            <div class="modal-actions">
                <button id="config-cancel-btn" class="numbers-btn">Cancelar</button>
                <button id="config-save-btn" class="numbers-btn">Salvar</button>
            </div>
        </div>
    </div>

    <script>
        // --- Seleção de Elementos do DOM ---
        const textArea = document.getElementById('multi-line-input');
        const largeCircle = document.getElementById('circle-large');
        const mediumCircle = document.getElementById('circle-medium');
        const smallCircle = document.getElementById('circle-small');
        const themeToggleBtn = document.getElementById('theme-toggle');
        const borderColorPicker = document.getElementById('border-color-picker');
        const circleLargeColorPicker = document.getElementById('circle-large-color-picker');
        const circleLargeFontColorPicker = document.getElementById('circle-large-font-color-picker');
        const root = document.documentElement;
        const badgeLarge = document.getElementById('badge-large');
        const badgeMedium = document.getElementById('badge-medium');
        const badgeSmall = document.getElementById('badge-small');
        const showSortedBtn = document.getElementById('show-sorted-btn');
        const sortedModal = document.getElementById('sorted-modal');
        const modalCloseBtn = document.getElementById('modal-close-btn');
        const sortedTableBody = document.querySelector('#sorted-table tbody');
        const configBtn = document.getElementById('config-btn');
        const configModal = document.getElementById('config-modal');
        const configModalCloseBtn = document.getElementById('config-modal-close-btn');
        const configSaveBtn = document.getElementById('config-save-btn');
        const configCancelBtn = document.getElementById('config-cancel-btn');
        const apiLinkInput = document.getElementById('apiUrl');
        const marquee = document.getElementById('single-line-marquee');
        const fireworksCanvas = document.getElementById('fireworks-canvas');
        
        let typingTimer;
        const doneTypingInterval = 2000;
        let bingoConfig = {};
        let marqueeMessages = [];
        let currentMessageIndex = 0;
        let isMarqueeSetup = false;
        let lastCommand = '';
        // Variáveis para a animação de fogos de artifício
        let f_ctx, f_width, f_height, animationFrameId;
        const fireworks = [];
        const particles = [];

        // --- Lógica dos Círculos e Badges ---
        function getBingoLetter(word) {
            if (word && /^\d+$/.test(word)) {
                const num = parseInt(word, 10);
                if (num >= bingoConfig.b_min && num <= bingoConfig.b_max) return 'B';
                if (num >= bingoConfig.i_min && num <= bingoConfig.i_max) return 'I';
                if (num >= bingoConfig.n_min && num <= bingoConfig.n_max) return 'N';
                if (num >= bingoConfig.g_min && num <= bingoConfig.g_max) return 'G';
                if (num >= bingoConfig.o_min && num <= bingoConfig.o_max) return 'O';
            }
            return ' ';
        }

        function isCommand(command) {
            const validCommands = ['limpar', 'resetar', 'bingo', 'parar'];
            return validCommands.includes(command.toLowerCase());
        }

        function runMarqueeAnimation() {
            if (!marquee || marqueeMessages.length === 0) {
                if (marquee) {
                    marquee.textContent = '';
                    marquee.classList.remove('is-animating');
                }
                return;
            }

            currentMessageIndex = currentMessageIndex % marqueeMessages.length;
            const { msg, tempo } = marqueeMessages[currentMessageIndex];
            marquee.textContent = msg;

            marquee.style.animation = 'none';
            void marquee.offsetWidth;
            marquee.style.animation = `marquee-left-pause-left ${tempo || 25}s linear`;

            marquee.classList.add('is-animating');
            currentMessageIndex++;
        }

        function setupMarqueeListener() {
            if (!marquee || isMarqueeSetup) return;
            marquee.addEventListener('animationend', runMarqueeAnimation);
            isMarqueeSetup = true;
        }

        function updateMarquee() {
            if (!marquee) return;

            marqueeMessages = [
                { msg: bingoConfig.msg_1, tempo: bingoConfig.tempo_1 },
                { msg: bingoConfig.msg_2, tempo: bingoConfig.tempo_2 },
                { msg: bingoConfig.msg_3, tempo: bingoConfig.tempo_3 },
                { msg: bingoConfig.msg_4, tempo: bingoConfig.tempo_4 },
                { msg: bingoConfig.msg_5, tempo: bingoConfig.tempo_5 }
            ].filter(item => item.msg && item.msg.trim() !== '');
            currentMessageIndex = 0;
            marquee.classList.remove('is-animating');
            setTimeout(runMarqueeAnimation, 100);
        }

        // --- Lógica de Input de Números e Comandos ---
        textArea.addEventListener('input', () => {
            clearTimeout(typingTimer);

            let words = textArea.value.trim().split(/\s+/).filter(word => word.length > 0);

            if (words.length > 0 && !/^\d+$/.test(words[words.length - 1])) {
                const potentialCommand = words.pop().toLowerCase();

                if (isCommand(potentialCommand)) {
                    lastCommand = potentialCommand;
                    const mainContainer = document.querySelector('.main-container');
                    mainContainer.classList.add('flash-success');
                    mainContainer.addEventListener('animationend', () => mainContainer.classList.remove('flash-success'), { once: true });

                    if (potentialCommand === 'bingo') {
                        triggerBingoAnimation();
                        textArea.value = words.join(' ') + ' '; // Remove o comando mas mantém os números
                    } else if (potentialCommand === 'limpar' || potentialCommand === 'resetar') {
                        textArea.value = '';
                        words = [];
                    } else if (potentialCommand === 'parar') {
                        stopBingoAnimation();
                        textArea.value = words.join(' ') + ' '; // Remove o comando
                    }
                } else {
                    lastCommand = potentialCommand;
                }
            }

            const lastWord = words[words.length - 1] || '';
            const secondLastWord = words[words.length - 2] || '';
            const thirdLastWord = words[words.length - 3] || '';

            largeCircle.textContent = lastWord;
            mediumCircle.textContent = secondLastWord;
            smallCircle.textContent = thirdLastWord;
            
            badgeLarge.textContent = getBingoLetter(lastWord);
            badgeMedium.textContent = getBingoLetter(secondLastWord);
            badgeSmall.textContent = getBingoLetter(thirdLastWord);
            
            typingTimer = setTimeout(exportarDados, doneTypingInterval);
        });

        // --- Lógica do Tema Claro/Escuro e Cores ---
        
        const defaultBorderColors = { light: '#f71501', dark: '#002aff' };
        const defaultCircleLargeBgColors = { light: '#f71501', dark: '#1b0684' };
        const defaultCircleLargeFontColors = { light: '#ffffff', dark: '#ffffff' };

        function applyThemeAndColor() {
            const theme = localStorage.getItem('theme') || 'dark';
            root.classList.toggle('dark-theme', theme === 'dark');
            themeToggleBtn.textContent = theme === 'dark' ? '☀️' : '🌙';

            // Aplica cor da borda
            const borderColorKey = `customBorderColor_${theme}`;
            const savedBorderColor = localStorage.getItem(borderColorKey);
            const finalBorderColor = savedBorderColor || defaultBorderColors[theme];
            root.style.setProperty('--main-container-border-color', finalBorderColor);
            borderColorPicker.value = finalBorderColor;
            
            // Aplica cor do fundo do círculo maior
            const circleBgColorKey = `customCircleLargeBgColor_${theme}`;
            const savedCircleBgColor = localStorage.getItem(circleBgColorKey);
            const finalCircleBgColor = savedCircleBgColor || defaultCircleLargeBgColors[theme];
            root.style.setProperty('--circle-large-bg-color', finalCircleBgColor);
            circleLargeColorPicker.value = finalCircleBgColor;
            root.style.setProperty('--primary-glow-color', finalCircleBgColor);
            
            // Aplica cor da fonte do círculo maior
            const fontColorKey = `customCircleLargeFontColor_${theme}`;
            const savedFontColor = localStorage.getItem(fontColorKey);
            const finalFontColor = savedFontColor || defaultCircleLargeFontColors[theme];
            root.style.setProperty('--circle-large-font-color', finalFontColor);
            circleLargeFontColorPicker.value = finalFontColor;
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            localStorage.setItem('theme', newTheme);
            applyThemeAndColor();
        });

        borderColorPicker.addEventListener('input', (event) => {
            const newColor = event.target.value;
            const currentTheme = localStorage.getItem('theme') || 'dark';
            const colorKey = `customBorderColor_${currentTheme}`;
            
            root.style.setProperty('--main-container-border-color', newColor);
            localStorage.setItem(colorKey, newColor);
        });
        
        circleLargeColorPicker.addEventListener('input', (event) => {

            root.style.setProperty('--primary-glow-color', newColor);

        circleLargeFontColorPicker.addEventListener('input', (event) => {

        });

        // --- Lógica do Modal e Exportação ---

        function gerarTabelaBingoHTML() {
            const title = bingoConfig.msg_1 || '';
            const computedStyles = getComputedStyle(root);
            const headerBgColor = computedStyles.getPropertyValue('--circle-large-bg-color').trim();
            const headerFontColor = computedStyles.getPropertyValue('--circle-large-font-color').trim();
            const cellBorderColor = computedStyles.getPropertyValue('--border-color').trim();
            
            const items = textArea.value.trim().split(/\s+/).filter(item => item.length > 0);
            const allNumbers = items.filter(item => !isNaN(parseFloat(item)) && isFinite(item)).map(Number);
            
            const b_col = allNumbers.filter(n => n >= bingoConfig.b_min && n <= bingoConfig.b_max).sort((a,b) => a-b);
            const i_col = allNumbers.filter(n => n >= bingoConfig.i_min && n <= bingoConfig.i_max).sort((a,b) => a-b);
            const n_col = allNumbers.filter(n => n >= bingoConfig.n_min && n <= bingoConfig.n_max).sort((a,b) => a-b);
            const g_col = allNumbers.filter(n => n >= bingoConfig.g_min && n <= bingoConfig.g_max).sort((a,b) => a-b);
            const o_col = allNumbers.filter(n => n >= bingoConfig.o_min && n <= bingoConfig.o_max).sort((a,b) => a-b);
            const maxLength = Math.max(15, b_col.length, i_col.length, n_col.length, g_col.length, o_col.length);

            let tableRowsHtml = '';
            for (let i = 0; i < maxLength; i++) {
                tableRowsHtml += `
                    <tr>
                        <td>${b_col[i] || ''}</td>
                        <td>${i_col[i] || ''}</td>
                        <td>${n_col[i] || ''}</td>
                        <td>${g_col[i] || ''}</td>
                        <td>${o_col[i] || ''}</td>
                    </tr>
                `;
            }

            const fullHtml = `
                <meta charset="UTF-8">
                <h1>${title}</h1>
                <style>
                    @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@700&display=swap');
                    table { width: 100%; border-collapse: collapse; text-align: center; }
                    th, td { border: 1px solid ${cellBorderColor}; padding: 0.5rem; font-size: 1.5rem; }
                    th { background-color: ${headerBgColor}; color: ${headerFontColor}; font-family: 'Roboto Slab', serif; }
                    td { background-color: #fcfaff; color: #333; }
                </style>
                <table>
                    <thead>
                        <tr><th>B</th><th>I</th><th>N</th><th>G</th><th>O</th></tr>
                    </thead>
                    <tbody>
                        ${tableRowsHtml}
                    </tbody>
                </table>
            `;

            return fullHtml.replace(/\s\s+/g, ' ').trim();
        }
        
        async function exportarDados() {
            const tableHtml = gerarTabelaBingoHTML();
            console.log("--- HTML da Tabela para Exportação ---");
            console.log(tableHtml);

            const apiUrl = bingoConfig.apiUrl.trim();

            if (apiUrl && (apiUrl.startsWith('http://') || apiUrl.startsWith('https://'))) {
                try {
                    const response = await fetch(`${apiUrl}/input`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'text/html; charset=utf-8',
                        },
                        body: tableHtml,
                    });

                    if (response.ok) {
                        console.log("HTML da tabela enviado para a API com sucesso!");
                        textArea.classList.add('flash-success');
                        textArea.addEventListener('animationend', () => {
                            textArea.classList.remove('flash-success');
                        }, { once: true });
                    } else {
                        throw new Error(`API retornou um erro: ${response.status} ${response.statusText}`);
                    }
                } catch (error) {
                    console.error("Erro ao enviar para a API:", error);
                    textArea.classList.add('flash-error');
                    textArea.addEventListener('animationend', () => {
                        textArea.classList.remove('flash-error');
                    }, { once: true });
                }
            } else {
                 console.log("Nenhum link de API válido foi fornecido. HTML gerado apenas no console.");
            }
        }

        showSortedBtn.addEventListener('click', () => {
            const items = textArea.value.trim().split(/\s+/).filter(item => item.length > 0);
            const allNumbers = items.filter(item => !isNaN(parseFloat(item)) && isFinite(item)).map(Number);
            
            const b_col = allNumbers.filter(n => n >= bingoConfig.b_min && n <= bingoConfig.b_max).sort((a,b) => a-b);
            const i_col = allNumbers.filter(n => n >= bingoConfig.i_min && n <= bingoConfig.i_max).sort((a,b) => a-b);
            const n_col = allNumbers.filter(n => n >= bingoConfig.n_min && n <= bingoConfig.n_max).sort((a,b) => a-b);
            const g_col = allNumbers.filter(n => n >= bingoConfig.g_min && n <= bingoConfig.g_max).sort((a,b) => a-b);
            const o_col = allNumbers.filter(n => n >= bingoConfig.o_min && n <= bingoConfig.o_max).sort((a,b) => a-b);

            const maxLength = Math.max(15, b_col.length, i_col.length, n_col.length, g_col.length, o_col.length);

            sortedTableBody.innerHTML = ''; // Limpa a tabela

                const cellB = document.createElement('td');

                cellI.textContent = i_col[i] || '';
                row.appendChild(cellI);
                
                const cellN = document.createElement('td');
                cellN.textContent = n_col[i] || '';
                row.appendChild(cellN);
                
                const cellG = document.createElement('td');
                cellG.textContent = g_col[i] || '';
                row.appendChild(cellG);

                const cellO = document.createElement('td');
                cellO.textContent = o_col[i] || '';
                row.appendChild(cellO);
                
                sortedTableBody.appendChild(row);
            }
            
            sortedModal.style.display = 'flex';
        });
        
        modalCloseBtn.addEventListener('click', () => {
            sortedModal.style.display = 'none';
        });
        
        sortedModal.addEventListener('click', (event) => {
            if(event.target === sortedModal) {

        // --- Lógica de Configuração ---
        function loadConfig() {
            const savedConfig = JSON.parse(localStorage.getItem('bingoConfig'));
            bingoConfig = savedConfig || {
                b_min: 1, b_max: 15, msg_1: '', tempo_1: 20,
                i_min: 16, i_max: 30, msg_2: '', tempo_2: 20,
                n_min: 31, n_max: 45, msg_3: '', tempo_3: 20,
                g_min: 46, g_max: 60, msg_4: '', tempo_4: 20,
                o_min: 61, o_max: 75, msg_5: '', tempo_5: 20,
                apiUrl: 'https://tinyurl.com/bingo-estancia'
            };

            for (const key in bingoConfig) {
                const element = document.getElementById(key);
                if(element) element.value = bingoConfig[key];
            }
            apiLinkInput.value = bingoConfig.apiUrl;

            updateMarquee();
        }
        
        configBtn.addEventListener('click', () => {
            for (const key in bingoConfig) {
                const element = document.getElementById(key);
                if(element) element.value = bingoConfig[key];
            }
            apiLinkInput.value = bingoConfig.apiUrl;
            configModal.style.display = 'flex';
        });

        configSaveBtn.addEventListener('click', () => {
            bingoConfig = {

                b_max: parseInt(document.getElementById('b_max').value) || 15,
                msg_1: document.getElementById('msg_1').value,

                i_min: parseInt(document.getElementById('i_min').value) || 16, 
                i_max: parseInt(document.getElementById('i_max').value) || 30,
                msg_2: document.getElementById('msg_2').value,
                tempo_2: parseInt(document.getElementById('tempo_2').value) || 20,
                n_min: parseInt(document.getElementById('n_min').value) || 31, 
                n_max: parseInt(document.getElementById('n_max').value) || 45,
                msg_3: document.getElementById('msg_3').value,
                tempo_3: parseInt(document.getElementById('tempo_3').value) || 20,
                g_min: parseInt(document.getElementById('g_min').value) || 46, 
                g_max: parseInt(document.getElementById('g_max').value) || 60,
                msg_4: document.getElementById('msg_4').value,
                tempo_4: parseInt(document.getElementById('tempo_4').value) || 20,
                o_min: parseInt(document.getElementById('o_min').value) || 61, 
                o_max: parseInt(document.getElementById('o_max').value) || 75,
                msg_5: document.getElementById('msg_5').value,

                apiUrl: document.getElementById('apiUrl').value
            };
            localStorage.setItem('bingoConfig', JSON.stringify(bingoConfig));
            configModal.style.display = 'none';

            updateMarquee();
        });

        configCancelBtn.addEventListener('click', () => {
            loadConfig(); // Reseta para os valores salvos
            configModal.style.display = 'none';
        });
        
        configModalCloseBtn.addEventListener('click', () => configCancelBtn.click());
        
        configModal.addEventListener('click', (event) => {
            if(event.target === configModal) configCancelBtn.click();
        });

        // Verifica as preferências salvas no carregamento da página
        document.addEventListener('DOMContentLoaded', () => {
            loadConfig();
            applyThemeAndColor();
            setupMarqueeListener();
            setupFireworks();
        });


        // --- Lógica da Animação do BINGO ---
        function random(min, max) {
            return Math.random() * (max - min) + min;
        }

        function setupFireworks() {
            if (!fireworksCanvas) return;
            f_ctx = fireworksCanvas.getContext('2d');
            f_width = fireworksCanvas.width = window.innerWidth;
            f_height = fireworksCanvas.height = window.innerHeight;
            window.addEventListener('resize', () => {
                f_width = fireworksCanvas.width = window.innerWidth;
                f_height = fireworksCanvas.height = window.innerHeight;
            });
        }

        class Firework {
            constructor() {
                this.x = random(f_width * 0.2, f_width * 0.8);
                this.y = f_height;
                this.targetY = random(f_height * 0.2, f_height * 0.5);
                this.speed = random(3, 5);
                this.color = `hsl(${random(0, 360)}, 100%, 60%)`;
            }
            update() {
                this.y -= this.speed;
                if (this.y <= this.targetY) {
                    explode(this.x, this.y, this.color);
                    return false;
                }
                return true;
            }
            draw() {
                f_ctx.beginPath();
                f_ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
                f_ctx.fillStyle = this.color;
                f_ctx.fill();
            }
        }

        // --- Lógica da Animação do BINGO (Versão Melhorada) ---
        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                const angle = random(0, Math.PI * 2);
                const speed = random(1, 10);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
                this.gravity = 0.1;
                this.friction = 0.98;
                this.life = random(60, 100); // Vida útil em frames
                this.initialLife = this.life;
                this.alpha = 1;
            }
            update() {
                this.life--;
                this.vx *= this.friction;
                this.vy *= this.friction;
                this.vy += this.gravity;
                this.x += this.vx;
                this.y += this.vy;
                this.alpha = Math.max(0, this.life / this.initialLife); // Efeito de fade
                return this.life > 0;
            }
            draw() {
                f_ctx.save();
                f_ctx.globalAlpha = this.alpha;
                f_ctx.beginPath();
                f_ctx.arc(this.x, this.y, 4, 0, Math.PI * 2, false);
                f_ctx.fillStyle = this.color;
                f_ctx.fill();
                f_ctx.restore();
            }
        }

        function explode(x, y, color) {
            const particleCount = 50 + random(0, 50); // Explosão mais densa
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function fireworksAnimateLoop() {
            // Pede o próximo frame
            animationFrameId = requestAnimationFrame(fireworksAnimateLoop);

            // Limpa o canvas para um novo desenho, sem deixar rastros
            f_ctx.clearRect(0, 0, f_width, f_height);

            // Lança novos fogos de artifício aleatoriamente para manter o loop contínuo
            if (Math.random() < 0.04) { // Ajuste a probabilidade para controlar a frequência
                fireworks.push(new Firework());
            }

            // Atualiza e desenha os fogos
            for (let i = fireworks.length - 1; i >= 0; i--) {
                if (!fireworks[i].update()) fireworks.splice(i, 1);
                else fireworks[i].draw();
            }

            // Atualiza e desenha as partículas
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) particles.splice(i, 1);
                else particles[i].draw();
            }

        }

        function triggerBingoAnimation() {
            if (!fireworksCanvas) return;
            
            const burstSize = 5 + Math.floor(random(0, 6)); // Lança de 5 a 10 fogos
            for (let i = 0; i < burstSize; i++) {
                setTimeout(() => fireworks.push(new Firework()), i * 100); // Lançamento escalonado
            }
            
            if (!animationFrameId) { // Inicia o loop se não estiver rodando
                fireworksCanvas.style.display = 'block';
                fireworksAnimateLoop();
            } else stopBingoAnimation(); // Para a animação se já estiver rodando
        }

        function stopBingoAnimation() {
            if (!fireworksCanvas) return;
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            fireworks.length = 0;
            particles.length = 0;
            if (f_ctx) f_ctx.clearRect(0, 0, f_width, f_height);
            fireworksCanvas.style.display = 'none';
        }

    </script>
